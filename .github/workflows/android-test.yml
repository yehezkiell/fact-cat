name: Android Test

on:
    push:
        branches: ["**"] # Triggers on push to any branch
    workflow_dispatch: # Allows manual triggering

jobs:
    test:
        name: Unit Tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Run Unit Tests
              run: ./gradlew test

            - name: Upload Test Results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: |
                      **/build/reports/tests/
                      **/build/reports/jacoco/
                  retention-days: 14

            - name: Upload Test Reports
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports
                  path: |
                      **/build/test-results/
                      **/build/reports/tests/
                  retention-days: 14
