name: Android CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - name: Set up JDK 17
              uses: actions/setup-java@v3
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build with Gradle
              run: ./gradlew build

            - name: Run Unit Tests
              run: ./gradlew test

            - name: Upload Test Results
              if: always()
              uses: actions/upload-artifact@v3
              with:
                  name: test-results
                  path: |
                      **/build/reports/tests/
                      **/build/reports/jacoco/

            - name: Upload Build Reports
              if: always()
              uses: actions/upload-artifact@v3
              with:
                  name: build-reports
                  path: |
                      **/build/reports/
                      !**/build/reports/tests/

            - name: Upload Test Results on Failure
              if: failure()
              uses: actions/upload-artifact@v3
              with:
                  name: test-results
                  path: |
                      **/build/test-results/
                      **/build/reports/tests/
